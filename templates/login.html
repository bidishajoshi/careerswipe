
{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<style>
/* Background */
body {
    background: linear-gradient(135deg, #eef2f7, #e3eafc);
    font-family: 'Segoe UI', sans-serif;
}

/* Center container */
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 90vh;
}
.footer {
    text-align: center;
    padding: 15px;
    background: #0f1115;
    color: #8aa0b8;
    font-size: 14px;
    border-top: 1px solid #1f2a38;
    position: fixed;
    bottom: 0;
    width: 100%;
}

/* Card */
.auth-box {
    background: #ffffff;
    padding: 2rem;
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    transition: 0.3s;
    width: 100%;
    max-width: 400px;
}

.auth-box:hover {
    transform: translateY(-5px);
}

/* Heading */
.auth-box h2 {
    text-align: center;
    margin-bottom: 1.5rem;
    color: #2557a7;
}

/* Form group */
.form-group {
    margin-bottom: 1rem;
    position: relative;
}

/* Labels */
.form-group label {
    font-weight: 600;
    font-size: 0.9rem;
}

/* Inputs */
.form-group input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    transition: 0.25s;
}

/* Hover */
.form-group input:hover {
    border-color: #2557a7;
    background: #f9fbff;
}

/* Focus */
.form-group input:focus {
    outline: none;
    border-color: #2557a7;
    box-shadow: 0 0 0 3px rgba(37,87,167,0.2);
}

/* Button */
.btn {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(45deg, #2557a7, #4facfe);
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg, #1e4a94, #3c8ce7);
}

/* Show password icon */
.password-wrapper {
    position: relative;
}

.password-wrapper span {
    position: absolute;
    right: 12px;
    top: 38px;
    cursor: pointer;
}

/* Link */
a {
    color: #2557a7;
    font-weight: 500;
}

a:hover {
    text-decoration: underline;
}
</style>

<div class="auth-container">
    <div class="auth-box glass-panel">
        <h2>Welcome Back</h2>

        <form method="POST">

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required>
            </div>
            
            <div class="form-group password-wrapper">
                <label>Password</label>
                <input type="password" id="password" name="password" required>
                <span onclick="togglePassword()">👁</span>
            </div>
            
            <button type="submit" class="btn">Login</button>
        </form>

       <p style="text-align: center; margin-top: 1rem; color: #666; font-size: 0.9rem;">
    Don't have an account? 
    <a href="{{ url_for('register') }}" style="color:#2557a7; font-weight:500;">Register</a>
</p>
        </p>
    </div>
     <div class="footer">
        <footer class="footer">
    © 2025 CareerSwipe — Find your next adventure.
</footer>
    </div>
</div>

<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

/* Input animation */
document.querySelectorAll("input").forEach(el => {
    el.addEventListener("focus", () => el.style.transform = "scale(1.02)");
    el.addEventListener("blur", () => el.style.transform = "scale(1)");
});
</script>

{% endblock %}
