
<div class="auth-container" style="padding: 2rem 0;">
    <div class="auth-box glass-panel" style="max-width: 600px;">
        <h2>Post a New Job</h2>
        <form method="POST" action="">
            <div class="form-group">
                <label for="title">Job Title</label>
                <input type="text" id="title" name="title" required placeholder="e.g. Senior Frontend Engineer">
            </div>
            
            <div class="form-group">
                <label for="skills">Required Skills (Comma separated)</label>
                <input type="text" id="skills" name="skills" required placeholder="Python, React, SQL...">
            </div>
            
            <div class="form-group">
                <label for="description">Job Description</label>
                <textarea id="description" name="description" rows="6" required placeholder="Describe the role, responsibilities, and perks..."></textarea>
            </div>
            
            <button type="submit" class="btn">Post Job</button>
        </form>
    </div>

    position: fixed;
    bottom: 0;
    width: 100%;>

</footer></div>
